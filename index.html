<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeBazaar India - Verified Second-Hand Bikes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>BikeBazaar</h1>
        <p>Verified Second-Hand Bikes in India | RC Check + AI Pricing</p>
        <input type="text" id="search" placeholder="Search by model, city (e.g., Pulsar Pimpri)">
        <button onclick="addListing()">+ List Bike</button>
    </header>

    <div id="listings"></div>

    <!-- Modal for Add Listing -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Add Your Bike</h2>
            <form id="listingForm">
                <input type="text" placeholder="Model (e.g., Honda Activa)" required>
                <input type="text" placeholder="RC Number" id="rcNum" required>
                <input type="number" placeholder="Price (₹)" required>
                <input type="number" placeholder="KM Driven" required>
                <input type="text" placeholder="City (e.g., Pimpri)" required>
                <button type="submit">Verify & List</button>
            </form>
            <p id="rcResult"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
